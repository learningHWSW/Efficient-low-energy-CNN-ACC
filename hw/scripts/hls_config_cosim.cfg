# =============================================================================
# hls_config_cosim.cfg — for RTL co-simulation (reduced TB, COSIM_SMALL)
#
# Run from the repo root (synthesize first, then cosim, same work_dir):
#   v++ -c --mode hls            --config hw/scripts/hls_config_cosim.cfg --work_dir build/hls_cosim
#   vitis-run --mode hls --cosim --config hw/scripts/hls_config_cosim.cfg --work_dir build/hls_cosim
#
# Note: both synthesis and TB need -DCOSIM_SMALL (shrinks the m_axi depths
# and enlarges the TB buffers as a matched pair)
# =============================================================================
part=xczu7ev-ffvc1156-2-e

[hls]
flow_target=vitis
clock=200MHz
syn.top=magnet_top
syn.file=../src/magnet_top.cpp
syn.file_cflags=../src/magnet_top.cpp,-I../include -std=c++14 -DCOSIM_SMALL
tb.file=../tb/tb_conv.cpp
tb.file_cflags=../tb/tb_conv.cpp,-I../include -std=c++14 -DCOSIM_SMALL
