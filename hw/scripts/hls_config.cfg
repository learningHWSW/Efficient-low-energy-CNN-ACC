# =============================================================================
# hls_config.cfg — Vitis unified HLS flow (2024.2+ / 2026.1), conv kernel
#
# Run from the repo root:
#   C simulation : vitis-run --mode hls --csim  --config hw/scripts/hls_config.cfg --work_dir build/hls
#   C synthesis  : v++ -c --mode hls            --config hw/scripts/hls_config.cfg --work_dir build/hls
#
# Relative paths are resolved against this cfg file's location.
# To change the target board, edit part=
#   ZCU104     = xczu7ev-ffvc1156-2-e  (default — free license tier, N_PES=8)
#   ZCU102     = xczu9eg-ffvb1156-2-e  (allows N_PES=16; needs an Enterprise license)
#   Kria KV260 = xck26-sfvc784-2LV-c   (requires the Kria SOM device at install time)
# =============================================================================
part=xczu7ev-ffvc1156-2-e

[hls]
flow_target=vitis
clock=200MHz
syn.top=magnet_top
syn.file=../src/magnet_top.cpp
syn.file_cflags=../src/magnet_top.cpp,-I../include -std=c++14
tb.file=../tb/tb_conv.cpp
tb.file_cflags=../tb/tb_conv.cpp,-I../include -std=c++14
