# =============================================================================
# hls_config_int4.cfg — conv kernel in the int4 configuration (Phase 5)
#
# Same as hls_config.cfg but with -DUSE_INT4: W/IA/OA become 4-bit and
# VECTOR_SIZE doubles to 16 (128 MAC/cycle per PE = 1024 total).
#
# Run from the repo root:
#   vitis-run --mode hls --csim --config hw/scripts/hls_config_int4.cfg --work_dir build/hls_int4
#   v++ -c --mode hls           --config hw/scripts/hls_config_int4.cfg --work_dir build/hls_int4
# =============================================================================
part=xczu7ev-ffvc1156-2-e

[hls]
flow_target=vitis
clock=200MHz
syn.top=magnet_top
syn.file=../src/magnet_top.cpp
syn.file_cflags=../src/magnet_top.cpp,-I../include -std=c++14 -DUSE_INT4
tb.file=../tb/tb_conv.cpp
tb.file_cflags=../tb/tb_conv.cpp,-I../include -std=c++14 -DUSE_INT4
