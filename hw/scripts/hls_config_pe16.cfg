# =============================================================================
# hls_config_pe16.cfg — 16-PE configuration (Simba chiplet class)
#
# 16 PEs = 1024 MAC/cycle int8 (409.6 GOPS) / 2048 MAC/cycle with -DUSE_INT4.
#
# REQUIRES a zu9eg-class device (ZCU102): 16 PEs exceed zu7ev BRAM (~117%).
# zu9eg is NOT covered by the free BASIC license — an Enterprise/university
# license is needed. The configuration is functionally verified (reference
# model 24/24 at N_PES=16, g++ TB 36/36 int8 and int4) and structurally
# synthesized (II=1, no violations; see docs/ARCHITECTURE.md).
#
# Run from the repo root (with a suitable license):
#   vitis-run --mode hls --csim --config hw/scripts/hls_config_pe16.cfg --work_dir build/hls_pe16
#   v++ -c --mode hls           --config hw/scripts/hls_config_pe16.cfg --work_dir build/hls_pe16
# =============================================================================
part=xczu9eg-ffvb1156-2-e

[hls]
flow_target=vitis
clock=200MHz
syn.top=magnet_top
syn.file=../src/magnet_top.cpp
syn.file_cflags=../src/magnet_top.cpp,-I../include -std=c++14 -DN_PES=16
tb.file=../tb/tb_conv.cpp
tb.file_cflags=../tb/tb_conv.cpp,-I../include -std=c++14 -DN_PES=16
