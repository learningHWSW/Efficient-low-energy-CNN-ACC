# =============================================================================
# hls_config_pe16_zu7ev.cfg — 16 PEs on the FREE-license zu7ev (ZCU104)
#
# The plain 16-PE build needs 790 BRAM18 (126% of zu7ev). Two knobs make it
# fit — measured 534 BRAM18 (85%) + 16 URAM (16%), DSP 52%, LUT 76%, all
# MAC loops II=1:
#   -DUSE_URAM_ROWBUF : PE row buffers move to spare UltraRAM (-128 BRAM18)
#   -DPT_ROWS=4       : halves each acc bank to one BRAM18   (-128 BRAM18)
# Trade-off of PT_ROWS=4: smaller row groups mean more weight reloads for
# layers with C2>1 (minor for ResNet-50). Note LUT 76% may require P&R
# timing effort at 200 MHz.
#
# Alternatives: xcku5p (free tier, fits at 82% BRAM, but no ARM PS) or
# xczu9eg/ZCU102 (comfortable, Enterprise license) — see hls_config_pe16.cfg.
#
# Run from the repo root:
#   vitis-run --mode hls --csim --config hw/scripts/hls_config_pe16_zu7ev.cfg --work_dir build/hls_pe16z
#   v++ -c --mode hls           --config hw/scripts/hls_config_pe16_zu7ev.cfg --work_dir build/hls_pe16z
# =============================================================================
part=xczu7ev-ffvc1156-2-e

[hls]
flow_target=vitis
clock=200MHz
syn.top=magnet_top
syn.file=../src/magnet_top.cpp
syn.file_cflags=../src/magnet_top.cpp,-I../include -std=c++14 -DN_PES=16 -DUSE_URAM_ROWBUF -DPT_ROWS=4
tb.file=../tb/tb_conv.cpp
tb.file_cflags=../tb/tb_conv.cpp,-I../include -std=c++14 -DN_PES=16 -DUSE_URAM_ROWBUF -DPT_ROWS=4
