# =============================================================================
# system.cfg — v++ link configuration (Phase 4: link both kernels to a platform)
#
# Prerequisites (a board platform is required — ZCU104 example):
#   1) Export the kernels:
#      v++ -c --mode hls --config hw/scripts/hls_config.cfg     --work_dir build/hls
#      v++ -c --mode hls --config hw/scripts/hls_config_gpe.cfg --work_dir build/hls_gpe
#      (use the .xo artifacts under each work_dir's hls/impl, or package_xo)
#   2) Link (hardware):
#      v++ -l -t hw --platform xilinx_zcu104_base_202610_1 \
#          --config hw/scripts/system.cfg \
#          build/hls/hls/magnet_top.xo build/hls_gpe/hls/global_pe_top.xo \
#          -o build/magnet.xclbin
#   3) For hardware emulation use -t hw_emu
#
# NOTE: no board platform (.xpfm) is installed on this PC, so the link step
#   is unverified. Platforms: AMD website "Vitis Embedded Platforms".
# =============================================================================

[connectivity]
nk=magnet_top:1:magnet_top_1
nk=global_pe_top:1:global_pe_top_1

# Spread the AXI masters over the four Zynq US+ PS HP ports (bandwidth).
# The four IA loader ports (gmem0/4/5/6) alias one buffer; spreading them
# over different HP ports gives the multi-port loader real DDR bandwidth.
sp=magnet_top_1.gmem0:HP0        # IA port 0
sp=magnet_top_1.gmem4:HP1        # IA port 1
sp=magnet_top_1.gmem5:HP2        # IA port 2
sp=magnet_top_1.gmem6:HP3        # IA port 3
sp=magnet_top_1.gmem1:HP1        # Weights
sp=magnet_top_1.gmem2:HP2        # OA
sp=magnet_top_1.gmem3:HP3        # bias
sp=global_pe_top_1.gmem0:HP0
sp=global_pe_top_1.gmem1:HP1
sp=global_pe_top_1.gmem2:HP2

[vivado]
# For timing-closure margin (if needed)
# prop=run.impl_1.STEPS.PLACE_DESIGN.ARGS.DIRECTIVE=ExtraNetDelay_low
